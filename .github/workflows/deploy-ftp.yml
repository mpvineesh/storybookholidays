name: Build And Deploy Via FTP

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FTP_SERVER: ${{ secrets.FTP_SERVER }}
      FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
      FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
      FTP_PORT: ${{ secrets.FTP_PORT }}
      FTP_SERVER_DIR: ${{ secrets.FTP_SERVER_DIR }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Validate FTP configuration
        run: |
          test -n "$FTP_SERVER" || (echo "Missing GitHub secret: FTP_SERVER" && exit 1)
          test -n "$FTP_USERNAME" || (echo "Missing GitHub secret: FTP_USERNAME" && exit 1)
          test -n "$FTP_PASSWORD" || (echo "Missing GitHub secret: FTP_PASSWORD" && exit 1)
          test -n "$FTP_SERVER_DIR" || (echo "Missing GitHub secret: FTP_SERVER_DIR" && exit 1)
          echo "FTP_PORT=${FTP_PORT:-21}" >> "$GITHUB_ENV"

      - name: Remove stale IIS web.config
        run: |
          curl --silent --show-error --disable-epsv \
            --user "$FTP_USERNAME:$FTP_PASSWORD" \
            "ftp://$FTP_SERVER:$FTP_PORT${FTP_SERVER_DIR%/}/" \
            -Q "-DELE web.config" || true

      - name: Deploy build folder over FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ env.FTP_SERVER }}
          username: ${{ env.FTP_USERNAME }}
          password: ${{ env.FTP_PASSWORD }}
          port: ${{ env.FTP_PORT }}
          protocol: ftp
          local-dir: ./build/
          server-dir: ${{ env.FTP_SERVER_DIR }}
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
